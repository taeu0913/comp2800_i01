<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review a Shaded Area</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-success">
    <div class="container">
      <a class="navbar-brand" href="index.html">ShadeFinder</a>
      <div>
        <a href="index.html" class="btn btn-outline-light btn-sm">Home</a>
      </div>
    </div>
  </nav>

  <!-- Form -->
  <div class="container mt-4">
    <h2>Review a Shaded Area</h2>
    <p class="text-muted">Help others by sharing your experience!</p>

    <form>
      <div class="mb-3">
        <label class="form-label">Area Name</label>
        <input type="text" class="form-control" placeholder="e.g. Trout Lake Park">
      </div>

      <div class="mb-3">
        <label class="form-label">Date Visited</label>
        <input type="date" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">Shade Rating</label>
        <select class="form-select">
          <option>Select a rating</option>
          <option>★★★★★ Excellent</option>
          <option>★★★★☆ Good</option>
          <option>★★★☆☆ Average</option>
          <option>★★☆☆☆ Poor</option>
          <option>★☆☆☆☆ Very Poor</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">How crowded was it?</label>
        <select class="form-select">
          <option>Select crowd level</option>
          <option>Not crowded at all</option>
          <option>Slightly crowded</option>
          <option>Moderately crowded</option>
          <option>Very crowded</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Written Review</label>
        <textarea class="form-control" rows="4" placeholder="Share your experience of this shaded area..."></textarea>
      </div>

      <div class="mb-3">
        <label class="form-label">Would you recommend it for families?</label>
        <div>
          <input type="radio" name="recommend" id="yes">
          <label for="yes"> Yes</label>&nbsp;&nbsp;
          <input type="radio" name="recommend" id="no">
          <label for="no"> No</label>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Upload a Photo (optional)</label>
        <input type="file" class="form-control">
      </div>

      <button type="submit" class="btn btn-success w-100">Submit Review</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
